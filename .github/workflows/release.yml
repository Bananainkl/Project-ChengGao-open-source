name: 发布 GitHub Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: 要重新构建和上传安装包的标签（例如 v1.20.2）
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    env:
      TARGET_TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_TAG }}

      - name: 使用 Xcode 26.6
        run: sudo xcode-select -s /Applications/Xcode_26.6.app/Contents/Developer

      - name: 核对版本与更新说明
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          build="$(tr -d '[:space:]' < BUILD_NUMBER)"
          test "${TARGET_TAG}" = "v${version}"
          test -s RELEASE_NOTES.md
          grep -Fq "${version}" RELEASE_NOTES.md
          grep -Fq "## ${version} (${build})" CHANGELOG.md

      - name: 缓存本地语音识别运行时
        uses: actions/cache@v4
        with:
          path: |
            .build/bootstrap-cache
            Frameworks/whisper.xcframework
            Models/ggml-small-q5_1.bin
            Licenses/whisper.cpp-LICENSE.txt
          key: chenggao-runtime-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('script/bootstrap_runtime.sh') }}

      - name: 准备并校验语音识别运行时
        run: ./script/bootstrap_runtime.sh

      - name: 测试
        run: swift test -Xswiftc -warnings-as-errors

      - name: 生成并验证 DMG
        run: |
          ./script/package_dmg.sh
          version="$(tr -d '[:space:]' < VERSION)"
          dmg="ChengGao-${version}-macOS-arm64.dmg"
          legacy_dmg="澄稿-${version}-macOS-arm64.dmg"

          # 历史标签仍使用中文产物名；手动重跑旧标签时统一转换为
          # GitHub Release 可稳定保留的 ASCII 文件名。
          if [[ ! -f "dist/${dmg}" && -f "dist/${legacy_dmg}" ]]; then
            mv "dist/${legacy_dmg}" "dist/${dmg}"
          fi

          (cd dist && shasum -a 256 "${dmg}" > "${dmg}.sha256")
          hdiutil verify "dist/${dmg}"
          (cd dist && shasum -a 256 -c "${dmg}.sha256")

      - name: 创建或更新 GitHub Release 并上传安装包
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          dmg="dist/ChengGao-${version}-macOS-arm64.dmg"
          checksum="${dmg}.sha256"

          if gh release view "${TARGET_TAG}" >/dev/null 2>&1; then
            gh release edit "${TARGET_TAG}" \
              --title "澄稿 ${TARGET_TAG}" \
              --notes-file RELEASE_NOTES.md
          else
            gh release create "${TARGET_TAG}" \
              --verify-tag \
              --title "澄稿 ${TARGET_TAG}" \
              --notes-file RELEASE_NOTES.md
          fi

          gh release upload "${TARGET_TAG}" "${dmg}" "${checksum}" --clobber
